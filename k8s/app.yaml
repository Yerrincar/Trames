apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: trames-data
  namespace: trames
  labels:
    app.kubernetes.io/name: trames
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: local-path
  resources:
    requests:
      storage: 2Gi

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: trames
  namespace: trames
  labels:
    app.kubernetes.io/name: trames
spec:
  replicas: 1

  strategy:
    type: Recreate

  revisionHistoryLimit: 3
  progressDeadlineSeconds: 180
  minReadySeconds: 5

  selector:
    matchLabels:
      app.kubernetes.io/name: trames

  template:
    metadata:
      labels:
        app.kubernetes.io/name: trames
    spec:
      automountServiceAccountToken: false
      terminationGracePeriodSeconds: 30

      imagePullSecrets:
        - name: ghcr-pull

      securityContext:
        runAsNonRoot: true
        runAsUser: 10001
        runAsGroup: 10001
        fsGroup: 10001
        fsGroupChangePolicy: OnRootMismatch
        seccompProfile:
          type: RuntimeDefault

      initContainers:
        - name: migrate
          image: trames-image
          imagePullPolicy: IfNotPresent

          command:
            - /app/goose
          args:
            - up

          env:
            - name: GOOSE_DRIVER
              value: sqlite3
            - name: GOOSE_DBSTRING
              value: /data/trames.db
            - name: GOOSE_MIGRATION_DIR
              value: /app/migrations
            - name: NO_COLOR
              value: "1"

          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL

          resources:
            requests:
              cpu: 10m
              memory: 32Mi
            limits:
              cpu: 250m
              memory: 256Mi

          volumeMounts:
            - name: data
              mountPath: /data
            - name: tmp
              mountPath: /tmp

      containers:
        - name: trames
          image: trames-image
          imagePullPolicy: IfNotPresent

          ports:
            - name: http
              containerPort: 4040
              protocol: TCP

          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL

          resources:
            requests:
              cpu: 25m
              memory: 64Mi
            limits:
              cpu: 500m
              memory: 512Mi

          startupProbe:
            httpGet:
              path: /healthz
              port: http
            periodSeconds: 2
            timeoutSeconds: 2
            failureThreshold: 30

          readinessProbe:
            httpGet:
              path: /healthz
              port: http
            periodSeconds: 10
            timeoutSeconds: 2
            failureThreshold: 3

          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            periodSeconds: 30
            timeoutSeconds: 2
            failureThreshold: 3

          volumeMounts:
            - name: data
              mountPath: /data

            - name: config
              mountPath: /config
              readOnly: true

            - name: tmp
              mountPath: /tmp

      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: trames-data

        - name: config
          secret:
            secretName: trames-env
            defaultMode: 0440

        - name: tmp
          emptyDir:
            sizeLimit: 64Mi

---
apiVersion: v1
kind: Service
metadata:
  name: trames
  namespace: trames
  labels:
    app.kubernetes.io/name: trames
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: trames
  ports:
    - name: http
      port: 80
      targetPort: http
      protocol: TCP

---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: trames
  namespace: trames
  labels:
    app.kubernetes.io/name: trames
spec:
  ingressClassName: traefik
  rules:
    - host: trames.lan
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: trames
                port:
                  number: 80
